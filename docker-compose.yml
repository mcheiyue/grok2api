name: grok2api

services:
  grok2api:
    container_name: grok2api
    image: "${GROK2API_IMAGE:-ghcr.io/chenyme/grok2api:latest}"
    ports:
      - "${GROK2API_PORT:-8000}:8000"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - "${GROK2API_CONFIG:-./config.yaml}:/run/grok2api/config.yaml:ro"
      - grok2api-data:/app/data
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true

  # 可选 WARP / 防封边车见独立文件（W2.5）：
  #   docker compose -f docker-compose.yml -f docker-compose.warp.yml up -d
  # 管理端出口节点填 socks5h://warp:1080；方案文档：仓库外 plans/W2.5-防封egress方案.md
  # （旧内联 warp 注释已迁至 docker-compose.warp.yml，避免与 profile 双份漂移。）

volumes:
  grok2api-data:
