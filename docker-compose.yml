name: grok2api

services:
  grok2api:
    container_name: grok2api
    image: "${GROK2API_IMAGE:-ghcr.io/chenyme/grok2api:latest}"
    ports:
      - "${GROK2API_PORT:-8000}:8000"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - "${GROK2API_CONFIG:-./config.yaml}:/run/grok2api/config.yaml:ro"
      - grok2api-data:/app/data
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true

  # 可选防封边车（profile）。管理端出口节点可填 socks5h://warp:1080。
  # 启动：docker compose --profile warp --profile flaresolverr up -d
  # 亦可叠加历史 overlay：docker compose -f docker-compose.yml -f docker-compose.warp.yml up -d
  # Clearance 模式选 FlareSolverr 时用 http://flaresolverr:8191（上游托管 clearance）。
  # 无 403 时不必启用；方案见仓库外 plans/W2.5-防封egress方案.md
  warp:
    container_name: warp
    image: caomingjun/warp:latest
    profiles: ["warp"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:1080:1080"
    environment:
      - WARP_SLEEP=2
    cap_add:
      - NET_ADMIN

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    profiles: ["flaresolverr"]
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: info
    restart: unless-stopped

volumes:
  grok2api-data:
